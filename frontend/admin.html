<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>总管后台 - 账户巡逻中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        .suat-theme { background: #75207D; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 lg:p-10 font-sans text-slate-900">
    <a href="index.html" style="position: fixed; bottom: 30px; right: 30px; background: #75207D; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; box-shadow: 0 4px 15px rgba(117,32,125,0.4); z-index: 9999; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" title="回到主页">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </a>
<div class="max-w-7xl mx-auto bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden">
    <header class="p-8 suat-theme text-white flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black tracking-tighter italic">MASTER PANEL</h1>
            <p class="text-xs opacity-70 mt-1 uppercase tracking-widest">中央控制后台 · 全服账户巡逻</p>
        </div>
        <div class="flex gap-4">
            <button onclick="window.location.href='recruit-admin.html'" class="bg-white/20 hover:bg-white/30 px-6 py-2 rounded-xl text-sm font-bold transition-all">⚙️ 前往分身配置厂</button>
            <button onclick="logout()" class="bg-white/10 hover:bg-red-500 px-6 py-2 rounded-xl text-sm font-bold transition-all">安全退出</button>
        </div>
    </header>

    <div class="p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-slate-800">全服用户物理状态</h2>
            <button onclick="fetchUsers()" class="text-xs bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg font-bold transition-all">🔄 强制刷新</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 text-xs uppercase tracking-widest border-b">
                        <th class="pb-4">物理 ID</th> 
                        <th class="pb-4">用户名</th>
                        <th class="pb-4">角色</th>
                        <th class="pb-4">物理状态</th>
                        <th class="pb-4">指挥操作</th>
                    </tr>
                </thead>
                <tbody id="user-list" class="text-sm font-medium"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8080/api' : `${window.location.protocol}//${window.location.host}/api`;
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';
    axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;

    window.onload = fetchUsers;

    async function fetchUsers() {
        try {
            document.getElementById('user-list').innerHTML = `<tr><td colspan="5" class="py-10 text-center text-slate-400 font-bold">📡 正在穿透数据库拉取...</td></tr>`;
            const res = await axios.get(`${API_BASE}/recruit/list`);
            document.getElementById('user-list').innerHTML = res.data.map(u => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="py-5 font-mono text-purple-600 font-bold">#${u.id}</td>
                    <td>${u.username}</td>
                    <td><span class="bg-purple-50 text-purple-600 px-3 py-1 rounded-full text-[10px] font-black">${u.role}</span></td>
                    <td>
                        <span class="${u.status === 'ACTIVE' ? 'text-green-500' : 'text-red-400'} font-bold">
                            ● ${u.status === 'ACTIVE' ? '正常活跃' : '已被注销/冻结'}
                        </span>
                    </td>
                    <td class="flex gap-3 py-5">
                        <button onclick="resetPwd('${u.username}')" class="text-blue-500 hover:underline text-xs font-bold">重置密码</button>
                        <button onclick="toggleStatus('${u.username}', '${u.status}')" class="${u.status === 'ACTIVE' ? 'text-red-400' : 'text-green-500'} hover:underline text-xs font-bold">
                            ${u.status === 'ACTIVE' ? '强制注销' : '激活账户'}
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (e) { alert("无权访问用户数据或 Token 过期"); }
    }

    async function resetPwd(username) {
        const newPwd = prompt(`正在为 [${username}] 修改密码，请输入新密码：`, "123456");
        if (!newPwd) return;
        try {
            await axios.post(`${API_BASE}/recruit/user/reset-password`, { username, newPassword: newPwd });
            alert("✅ 物理重写成功，新密码已生效。");
        } catch (e) { alert("修改失败"); }
    }

    // 🚀 核心修复：同步不及时问题
    async function toggleStatus(username, currentStatus) {
        const action = currentStatus === 'ACTIVE' ? "注销/冻结" : "重新激活";
        if (!confirm(`确定要对 [${username}] 执行 ${action} 操作吗？`)) return;
        
        try {
            // 加上 await 强制等待后端数据库落盘
            await axios.post(`${API_BASE}/recruit/user/toggle-status`, { username });
            // 落盘后再拉取，绝对不会出现“延迟感”
            await fetchUsers(); 
        } catch (e) { alert("操作失败"); }
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
