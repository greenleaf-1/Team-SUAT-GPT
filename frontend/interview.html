<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 招聘空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .step-inactive { display: none !important; }
        .suat-theme { background: #75207D; }
        .suat-gradient { background: linear-gradient(135deg, #75207D 0%, #A044AD 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        
        /* ========================================================
           🚀 终极响应式布局：手机端连贯滚动 vs 电脑端物理分屏
           ======================================================== */
        
        /* 【手机端默认状态】: 瀑布流连贯长页面 */
        .split-layout { 
            position: fixed; inset: 0; z-index: 1000; background: white; 
            display: block; /* 核心：块级排布，上下自然接续 */
            width: 100vw; height: 100vh; 
            overflow-y: auto; /* 开启全局贯通滚动 */
            -webkit-overflow-scrolling: touch;
        }
        .split-left { 
            height: auto; /* 高度由公告内容自然撑开 */
            padding: 1.5rem; 
            background: #fcfcfc; 
            border-bottom: 2px dashed #cbd5e1; /* 物理分割线 */
        }
        .split-right { 
            height: auto; 
            min-height: 100vh; /* 确保交互区至少占满一屏，防止输入框悬空 */
            display: flex; flex-direction: column; background: white; 
        }
        #chat-stream { 
            flex: 1; 
            overflow-y: visible; /* 手机端取消内部滚动，融入全局瀑布流 */
            padding-bottom: 2rem;
        }
        .chat-input-area { 
            position: sticky; bottom: 0; z-index: 50; /* 手机端：输入框永远吸附在屏幕底部 */
            box-shadow: 0 -10px 20px -5px rgba(0, 0, 0, 0.05);
        }

        /* 【电脑端/大屏状态 (>1024px)】: 左右五五开独立滚动 */
        @media (min-width: 1024px) { 
            .split-layout { 
                display: flex; flex-direction: row; 
                overflow-y: hidden; /* 关闭全局滚动 */
            } 
            .split-left { 
                flex: 1; height: 100%; border-bottom: none; border-right: 2px solid #f1f5f9; padding: 3rem; 
                overflow-y: auto; /* 左侧公告独立滚动 */
            } 
            .split-right { 
                flex: 1; height: 100%; min-height: auto; 
                overflow-y: hidden; /* 右侧由聊天框控制内部滚动 */
            } 
            #chat-stream { 
                overflow-y: auto; /* 电脑端聊天框独立滚动 */
                padding-bottom: 1rem;
            }
            .chat-input-area { 
                position: relative; box-shadow: none; /* 取消吸底 */
            }
        }

        /* Markdown 渲染美化 */
        .prose table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        .prose th, .prose td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .prose th { background: #f8fafc; color: #75207D; }
        .prose blockquote { border-left: 4px solid #75207D; padding-left: 1em; color: #64748b; font-style: italic; background: #faf5ff; padding: 10px; border-radius: 4px;}
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900 custom-scrollbar">
    <a href="index.html" style="position: fixed; bottom: 30px; right: 30px; background: #75207D; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; box-shadow: 0 4px 15px rgba(117,32,125,0.4); z-index: 9999; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" title="回到主页">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </a>
    <div id="lobby-view" class="step-inactive max-w-6xl mx-auto py-12 px-6">
        <header class="flex flex-col md:flex-row justify-between items-center md:items-end mb-12 border-b border-slate-200 pb-6 gap-4">
            <div>
                <div class="flex items-center gap-4 mb-2 justify-center md:justify-start">
                    <div class="w-12 h-12 suat-gradient rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">AI</div>
                    <h1 class="text-4xl font-black text-slate-800 tracking-tight">招募大厅</h1>
                </div>
                <p class="text-slate-500 text-center md:text-left">当前登录账号：<span id="user-identity" class="text-purple-600 font-bold">探测中...</span></p>
            </div>
            <button onclick="localStorage.clear(); location.href='login.html'" class="text-xs text-red-400 hover:text-red-600 font-bold">退出登录</button>
        </header>
        
        <div id="job-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-slate-400 animate-pulse font-bold">正在同步全网物理岗位...</div>
        </div>
    </div>

    <div id="split-view" class="step-inactive split-layout">
        
        <div class="split-left custom-scrollbar relative">
            <button onclick="goBackToLobby()" class="absolute top-4 right-4 text-xs bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-full font-bold transition-all text-slate-700 shadow-sm z-10">← 暂存并回大厅</button>
            <div class="flex items-center gap-3 mb-6 pr-24">
                <div class="w-12 h-12 suat-theme rounded-xl flex items-center justify-center text-white font-black shadow-md shrink-0">JD</div>
                <div>
                    <h2 id="jd-title" class="text-2xl font-black text-slate-800">加载中...</h2>
                    <p class="text-xs text-purple-600 font-bold mt-1 bg-purple-50 px-2 py-0.5 rounded inline-block border border-purple-100">
                        发布者：<span id="jd-publisher">--</span>
                    </p>
                </div>
            </div>
            <article id="jd-content" class="prose max-w-none text-slate-700 leading-relaxed"></article>
        </div>

        <div class="split-right">
            
            <div id="action-submit" class="step-inactive flex-1 p-6 lg:p-12 flex flex-col justify-center">
                <div class="mb-8">
                    <h3 class="text-2xl font-black text-slate-800 mb-2">简历投递与评估</h3>
                    <p class="text-slate-500 text-sm">选择上传文件，或直接粘贴文字。AI 将即刻为您进行匹配度分析。</p>
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <div class="bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200 hover:border-purple-400 transition-all flex items-center gap-6 group cursor-pointer" onclick="document.getElementById('resume-file').click()">
                        <div class="text-5xl group-hover:scale-110 transition-transform">📄</div>
                        <div class="flex-1 text-left">
                            <h4 class="font-black text-slate-800 text-lg">上传简历文档</h4>
                            <p class="text-xs text-slate-400">支持 PDF / Word 格式，系统将自动提取。</p>
                        </div>
                        <input type="file" id="resume-file" class="hidden" onchange="submitApplication('file')">
                    </div>

                    <div class="bg-purple-50 p-6 rounded-3xl border-2 border-purple-100 flex flex-col gap-4">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">✍️</span>
                            <h4 class="font-black text-slate-800">直接粘贴简历文字</h4>
                        </div>
                        <textarea id="resume-text" class="w-full p-4 rounded-xl border border-purple-200 text-sm outline-none focus:ring-2 ring-purple-400 custom-scrollbar bg-white shadow-inner" placeholder="在此处粘贴您的工作经历或自我评价..." rows="5"></textarea>
                        <button onclick="submitApplication('text')" class="suat-theme text-white py-3 rounded-xl font-black shadow-md hover:opacity-90 transition-all active:scale-95">提交文字并评估</button>
                    </div>
                </div>

                <div id="loading-overlay" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                    <div class="w-16 h-16 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin mb-4"></div>
                    <p class="text-purple-700 font-bold text-lg animate-pulse">AI 考官正在深度研读履历...</p>
                    <p class="text-slate-400 text-sm mt-2">预计耗时 1-3 分钟，请勿关闭</p>
                </div>
            </div>

            <div id="action-interview" class="step-inactive flex-1 flex flex-col h-full">
                <div class="suat-theme p-4 lg:p-6 text-white flex justify-between items-center shadow-md shrink-0 z-10">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">🎙️</div>
                        <div>
                            <h3 class="font-black tracking-wide">专家面试进行中</h3>
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 bg-green-400 rounded-full animate-ping"></span>
                                <span class="text-[10px] uppercase opacity-80 font-mono">档案 ID: #<span id="rid-display">--</span></span>
                            </div>
                        </div>
                    </div>
                    <button onclick="abortAndRetry()" class="flex items-center gap-1 text-[11px] font-bold bg-red-500 hover:bg-red-600 border border-red-400 px-3 py-1.5 rounded-lg transition-all shadow-sm">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        作废重投
                    </button>
                </div>
                
                <div id="chat-stream" class="bg-slate-50 relative p-4 lg:p-8 space-y-6"></div>
                
                <div class="chat-input-area p-4 lg:p-6 bg-white border-t border-slate-100 flex gap-3 w-full">
                    <input type="text" id="chat-input" class="flex-1 bg-slate-100 px-5 py-4 rounded-2xl outline-none focus:ring-2 ring-purple-300 text-sm shadow-inner" placeholder="输入回答，按回车发送..." onkeyup="if(event.key==='Enter') sendChatMsg()">
                    <button onclick="sendChatMsg()" class="suat-theme text-white px-8 rounded-2xl font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div id="result-view" class="step-inactive fixed inset-0 z-[10000] bg-gradient-to-br from-purple-50 to-white flex flex-col items-center justify-center p-6 text-center">
        <div class="text-9xl mb-6 drop-shadow-xl">🎉</div>
        <h2 class="text-4xl font-black text-slate-800 mb-2">面试圆满通过</h2>
        <p class="text-slate-500 max-w-md">您的表现数据已物理封存。招聘方将很快与您取得联系。</p>
        <button onclick="goBackToLobby(true)" class="mt-10 suat-theme text-white px-10 py-4 rounded-full font-black shadow-xl hover:scale-105 transition-all">返回大厅</button>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8080/api' : `${window.location.protocol}//${window.location.host}/api`;
        const token = localStorage.getItem('token');

        // 🚀 SaaS 核心：全局 engine 增加 tenantId 解析
        let engine = {
            userId: null,
            username: localStorage.getItem('username') || "求职者",
            tenantId: new URLSearchParams(window.location.search).get('tenant') || 'recruit', // 🚀 记录并咬死当前的暗号
            jobId: new URLSearchParams(window.location.search).get('jobId'), 
            recordId: null,
            currentJobData: null,
            chatCount: 0
        };

        window.onload = async () => {
            if (!token) {
                // 跳转登录时保留当前的 tenant 参数
                const currentUrl = window.location.href;
                const safeRedirectUrl = encodeURIComponent(currentUrl);
                window.location.href = `login.html?redirect=${safeRedirectUrl}`;
            }
            
            try {
                const userRes = await axios.get(`${API_BASE}/auth/me`);
                engine.userId = userRes.data.id;
                engine.username = userRes.data.username;
                document.getElementById('user-identity').innerText = engine.username;
            } catch(e) { console.warn("身份拉取失败"); }

            if (engine.jobId) {
                await checkAndRouteJob(engine.jobId);
            } else {
                showSection('lobby-view');
                fetchLobbyJobs();
            }
        };

        function showSection(mainId, subId = null) {
            ['lobby-view', 'split-view', 'result-view'].forEach(id => {
                document.getElementById(id).classList.add('step-inactive');
            });
            document.getElementById(mainId).classList.remove('step-inactive');

            if (mainId === 'split-view' && subId) {
                document.getElementById('action-submit').classList.add('step-inactive');
                document.getElementById('action-interview').classList.add('step-inactive');
                document.getElementById(subId).classList.remove('step-inactive');
            }
        }

        async function fetchLobbyJobs() {
            try {
                const res = await axios.get(`${API_BASE}/recruit/job-stats`);
                document.getElementById('job-list').innerHTML = (res.data || []).map(j => `
                    <div onclick="navigateToJob(${j.id})" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:border-purple-500 hover:shadow-xl cursor-pointer transition-all flex flex-col justify-between group">
                        <div>
                            <h3 class="font-black text-xl text-slate-800 mb-2 group-hover:text-purple-700 transition-colors">${j.title}</h3>
                            <p class="text-xs text-slate-500 line-clamp-2">${j.adText ? j.adText.replace(/#/g,'').substring(0, 80) : '点击查看岗位详情...'}</p>
                        </div>
                        <div class="mt-6 pt-4 border-t border-slate-50 flex justify-between items-center">
                            <span class="text-[10px] text-purple-600 font-bold bg-purple-50 px-2 py-1 rounded">发布者: ${j.publisher || '管理员'}</span>
                            <span class="text-xs font-black text-slate-300 group-hover:text-purple-600">进入投递 →</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('job-list').innerHTML = "服务器连接异常"; }
        }

        // 🚀 核心修复 1：进入岗位详情时，拼接 tenant 暗号
        function navigateToJob(id) {
            history.pushState(null, '', `?tenant=${engine.tenantId}&jobId=${id}`);
            engine.jobId = id;
            checkAndRouteJob(id);
        }

        // 🚀 核心修复 2：退回大厅时，保留 tenant 暗号
        function goBackToLobby(isFinished = false) {
            if (isFinished) localStorage.removeItem(`suat_rid_${engine.userId}_${engine.jobId}`);
            history.pushState(null, '', `?tenant=${engine.tenantId}`);
            engine.jobId = null; engine.recordId = null;
            showSection('lobby-view'); fetchLobbyJobs();
        }

        async function checkAndRouteJob(jobId) {
            try {
                const res = await axios.get(`${API_BASE}/recruit/job-stats`);
                const job = res.data.find(j => String(j.id) === String(jobId));
                if (!job) { alert("此岗位已关闭"); return goBackToLobby(); }
                
                engine.currentJobData = job;
                document.getElementById('jd-title').innerText = job.title;
                document.getElementById('jd-publisher').innerText = job.publisher || '系统管理员';
                document.getElementById('jd-content').innerHTML = marked.parse(job.adText || "暂无详细公告");

                const savedRid = localStorage.getItem(`suat_rid_${engine.userId}_${jobId}`);
                if (savedRid) {
                    engine.recordId = savedRid;
                    resumeInterview(); 
                } else {
                    showSection('split-view', 'action-submit'); 
                }
            } catch (e) {}
        }

        async function submitApplication(type) {
            const name = prompt("请输入真实姓名：", engine.username);
            const email = prompt("请输入通知接收邮箱：");
            if (!name || !email) return;

            const fd = new FormData();
            fd.append('jobId', engine.jobId); 
            fd.append('candidateName', name); 
            fd.append('email', email);
            
            // 🚀 SaaS 接口参数：传递分身暗号，让后端选用正确的 Prompt
            fd.append('tenantId', engine.tenantId); 

            if (type === 'file') {
                const fileEl = document.getElementById('resume-file');
                if(!fileEl.files[0]) return alert("未选择文件");
                fd.append('file', fileEl.files[0]);
            } else {
                const text = document.getElementById('resume-text').value;
                if(!text.trim()) return alert("文本为空");
                const fakeFile = new File([new Blob([text])], `${name}_简历.txt`, { type: "text/plain" });
                fd.append('file', fakeFile); 
                fd.append('resumeText', text);
            }

            document.getElementById('loading-overlay').classList.remove('hidden');

            try {
                const res = await axios.post(`${API_BASE}/interview/upload`, fd, { timeout: 180000 });
                if (res.data.code === 200) {
                    engine.recordId = res.data.recordId;
                    localStorage.setItem(`suat_rid_${engine.userId}_${engine.jobId}`, engine.recordId);
                    activateInterviewZone(res.data.analysis);
                }
            } catch (e) { alert("评估异常，请精简文本或重试。"); }
            finally { document.getElementById('loading-overlay').classList.add('hidden'); }
        }

        function abortAndRetry() {
            if (!confirm("⚠️ 确定要彻底作废当前的面试和简历吗？\n此操作将清除该岗位的历史聊天记录。")) return;
            localStorage.removeItem(`suat_rid_${engine.userId}_${engine.jobId}`);
            engine.recordId = null; engine.chatCount = 0;
            document.getElementById('chat-stream').innerHTML = "";
            if(document.getElementById('resume-file')) document.getElementById('resume-file').value = "";
            if(document.getElementById('resume-text')) document.getElementById('resume-text').value = "";
            showSection('split-view', 'action-submit');
        }

        async function resumeInterview() {
            try {
                const res = await axios.get(`${API_BASE}/recruit/candidate/${engine.recordId}`);
                if (res.data.status === 'HIRED' || res.data.status === 'REJECTED') return showSection('result-view');
                activateInterviewZone(null, res.data.chatHistory);
            } catch (e) { 
                localStorage.removeItem(`suat_rid_${engine.userId}_${engine.jobId}`);
                showSection('split-view', 'action-submit'); 
            }
        }

        function activateInterviewZone(analysis, history = null) {
            showSection('split-view', 'action-interview');
            document.getElementById('rid-display').innerText = engine.recordId;
            const win = document.getElementById('chat-stream');
            
            if (history && history.trim() !== "") {
                win.innerHTML = "";
                const turns = history.split(/(?=面试官:|应聘者:|AI:|用户:)/g);
                turns.forEach(turn => {
                    const text = turn.trim();
                    if (!text) return;
                    if (text.match(/^(应聘者|用户):/)) {
                        renderBubble("ME", text.replace(/^(应聘者|用户):/, "").trim());
                    } else {
                        renderBubble("AI", text.replace(/^(面试官|AI):/, "").trim());
                    }
                });
            } else if (analysis) {
                win.innerHTML = "";
                renderBubble("AI", "### 📊 简历深度评估\n" + analysis);
                renderBubble("AI", `你好，**${engine.username}**。简历评估已就绪，发送任意文字即可开始正式面试。`);
            }
            startWatchdog();
            
            // 首次渲染完成强制滚到底部
            setTimeout(() => scrollSmart(), 100);
        }

        async function sendChatMsg() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg || !engine.recordId) return;

            renderBubble("ME", msg);
            input.value = "";
            engine.chatCount++;

            try {
                const res = await axios.post(`${API_BASE}/interview/chat`, {
                    recordId: engine.recordId, 
                    message: msg, 
                    jobTitle: engine.currentJobData.title, 
                    chatCount: engine.chatCount,
                    tenantId: engine.tenantId // 🚀 SaaS 接口参数：传递分身暗号，使用对应面试官性格
                });
                renderBubble("AI", res.data.reply);
            } catch (e) { renderBubble("AI", "⚠️ 物理信号中断，请重试。"); }
        }

        function renderBubble(role, text) {
            const win = document.getElementById('chat-stream');
            const div = document.createElement('div');
            div.className = role === 'ME' ? 'flex justify-end' : 'flex justify-start';
            div.innerHTML = `
                <div class="max-w-[92%] p-5 rounded-2xl shadow-sm text-sm ${role === 'ME' ? 'suat-gradient text-white' : 'bg-white border border-slate-200 prose'}">
                    ${role === 'AI' ? marked.parse(text) : text}
                </div>`;
            win.appendChild(div);
            scrollSmart(div);
        }

        // 🚀 核心：智能焦点追踪，适配手机端全页滚动和电脑端局部滚动
        function scrollSmart(targetNode = null) {
            if (targetNode && typeof targetNode.scrollIntoView === 'function') {
                targetNode.scrollIntoView({ behavior: 'smooth', block: 'end' });
            } else {
                if (window.innerWidth < 1024) {
                    const layout = document.querySelector('.split-layout');
                    layout.scrollTo({ top: layout.scrollHeight, behavior: 'smooth' });
                } else {
                    const win = document.getElementById('chat-stream');
                    win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
                }
            }
        }

        function startWatchdog() {
            setInterval(async () => {
                if (!engine.recordId) return;
                const res = await axios.get(`${API_BASE}/recruit/candidate/${engine.recordId}`);
                if (res.data.status === 'HIRED') {
                    localStorage.removeItem(`suat_rid_${engine.userId}_${engine.jobId}`);
                    showSection('result-view');
                }
            }, 6000);
        }
    </script>
</body>
</html>
