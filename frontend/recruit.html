<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>AI面试官招聘系统（企业管理端）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .suat-gradient { background: linear-gradient(135deg, #75207D 0%, #a239b0 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #75207D; border-radius: 10px; }
        .terminal-box { background: #1a1a1a; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .cursor-blink::after { content: '_'; animation: blink 1s infinite; }
        
        /* 🚀 对齐：Markdown 渲染样式微调，确保报告表格美观 */
        #report-resume table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
        #report-resume th, #report-resume td { border: 1px solid #e2e8f0; padding: 4px 8px; text-align: left; }
        #report-resume th { background: #f8fafc; color: #75207D; font-weight: 800; }
        #report-resume blockquote { border-left: 4px solid #75207D; padding-left: 10px; color: #666; font-style: italic; margin: 10px 0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen custom-scrollbar">

<div class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 suat-gradient rounded-xl flex items-center justify-center text-white text-2xl font-bold shadow-lg">B</div>
            <div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">AI面试官招聘系统（企业管理端）</h1>
                <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">请企业招聘负责人在此发布招聘信息、查看报名结果、进行录用决策</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="admin-tag" class="px-6 py-2 bg-white shadow-sm border rounded-full text-purple-700 font-bold text-sm">账号: 探测中...</div>
            <button onclick="localStorage.clear(); location.href='login.html'" class="text-xs text-gray-400 hover:text-red-500 font-bold uppercase">退出登录</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        <div class="lg:col-span-4 lg:sticky lg:top-10 space-y-6">
            <div class="glass-card p-6 rounded-3xl shadow-xl border-t-4 border-purple-600">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-purple-700">✍️ 岗位发布/编辑</h3>
                <div class="space-y-4">
                    <input type="text" id="job-title" placeholder="岗位名称 (如: 小学数学老师)" class="w-full px-4 py-3 bg-gray-50 border-none rounded-2xl focus:ring-2 ring-purple-500 outline-none transition-all">
                    <textarea id="job-desc" placeholder="输入企业（部门）介绍、岗位关键词（职责、要求），AI 将自动扩写招聘广告..." class="w-full px-4 py-3 bg-gray-50 border-none rounded-2xl h-24 outline-none focus:ring-2 ring-purple-500 transition-all"></textarea>
                    
                    <div id="ad-edit-area" class="hidden animate-fade-in">
                        <label class="text-[10px] font-black text-purple-600 uppercase tracking-tighter">招聘公告已生成，请修改并确认：</label>
                        <textarea id="ad-content" class="w-full px-4 py-3 bg-purple-50 border border-purple-200 rounded-2xl h-48 text-xs mt-1 focus:ring-2 ring-purple-500 outline-none custom-scrollbar"></textarea>
                    </div>

                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-2xl">
                        <span class="text-sm font-bold text-gray-600">开启笔试环节（暂未启用本环节）</span>
                        <input type="checkbox" id="needs-test" class="w-6 h-6 accent-purple-600" checked>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="generateAd()" id="gen-btn" class="col-span-2 py-4 suat-gradient text-white rounded-2xl font-bold shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                            ✨ AI面试官生成招聘公告
                        </button>
                        <button onclick="publishJob()" id="pub-btn" class="hidden col-span-2 py-3 border-2 border-purple-600 text-purple-700 rounded-2xl font-bold hover:bg-purple-50 transition-all">
                            📢 确认并发布（更新）岗位
                        </button>
                    </div>
                    <button onclick="resetForm()" class="w-full text-[10px] text-gray-400 font-bold hover:underline">清空面板重置</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="glass-card p-8 rounded-3xl shadow-xl min-h-[600px]">
                <div class="flex justify-between items-center mb-8 lg:sticky lg:top-0 bg-white/80 backdrop-blur-md z-10 py-2">
                    <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                        📊 已发布招聘信息：<br>
                        待应聘提交后在此页面查看，下次登录后可从首页进入 <span id="sync-dot" class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                    </h3>
                    <div class="flex gap-2">
                        <button onclick="loadJobStats()" class="px-4 py-2 text-xs font-bold bg-white border rounded-full hover:shadow-md active:scale-95 transition">🔄 强制刷新</button>
                    </div>
                </div>
                
                <div id="stat-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
            </div>
        </div>
    </div>
</div>

<div id="candidate-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-6xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col h-[90vh]">
        <div class="suat-gradient p-8 text-white flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-4xl shadow-inner">👤</div>
                <div>
                    <h3 id="modal-name" class="text-3xl font-black tracking-tighter">姓名</h3>
                    <p id="modal-job" class="text-purple-100 font-bold tracking-widest uppercase text-[10px] mt-1">Status: <span id="modal-status-tag" class="bg-white/20 px-2 py-0.5 rounded">--</span></p>
                </div>
            </div>
            <div class="flex gap-3">
                <button id="btn-interrupt" class="px-6 py-2 bg-red-500 hover:bg-red-600 rounded-full font-black text-sm transition shadow-lg active:scale-95">🛑 中断</button>
                <button id="btn-hire" class="px-6 py-2 bg-green-500 hover:bg-green-600 rounded-full font-black text-sm transition shadow-lg active:scale-95">🎓 确认入职</button>
                <button onclick="closeModal()" class="w-12 h-12 flex items-center justify-center hover:bg-white/20 rounded-full text-3xl transition-all">✕</button>
            </div>
        </div>
        
        <div class="flex-1 overflow-hidden flex flex-col md:flex-row bg-slate-50">
            <div class="w-full md:w-1/3 p-6 overflow-y-auto custom-scrollbar border-r border-gray-100">
                <h4 class="font-black text-purple-700 flex items-center gap-2 mb-4 text-sm uppercase tracking-wider">📄 AI面试官简历评估报告</h4>
                <div id="report-resume" class="bg-white p-5 rounded-3xl border border-gray-100 text-sm leading-relaxed shadow-sm"></div>
            </div>

            <div class="w-full md:w-1/3 p-6 overflow-y-auto custom-scrollbar border-r border-gray-100">
                <h4 class="font-black text-green-700 flex items-center gap-2 mb-4 text-sm uppercase tracking-wider">📝 专业笔试档案</h4>
                <div id="candidate-list" class="bg-white p-5 rounded-3xl border border-gray-100 space-y-4 shadow-sm">
                    <div id="report-test-container">
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase">考察题目</p>
                            <div id="report-test-q" class="text-xs mt-1 text-gray-600 font-bold"></div>
                        </div>
                        <div class="border-t pt-4 mt-4">
                            <p class="text-[10px] font-bold text-gray-400 uppercase">答卷</p>
                            <div id="report-test-a" class="text-xs mt-1 text-blue-600 italic"></div>
                        </div>
                    </div>
                    <div class="bg-green-50 p-4 rounded-2xl border-l-4 border-green-500">
                        <p class="font-black text-green-700 text-xs">AI 综合评分结果</p>
                        <div id="report-test-eval" class="mt-1 text-xs text-green-600 leading-relaxed"></div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-1/3 p-6 flex flex-col">
                <h4 class="font-black text-blue-700 flex items-center justify-between mb-4 text-sm uppercase tracking-wider">
                    🎙️ 实时面试监控 <span id="round-tag" class="text-[10px] bg-blue-100 px-2 py-0.5 rounded text-blue-600 font-mono">ROUND: 0</span>
                </h4>
                <div id="report-chat" class="terminal-box flex-1 p-5 rounded-3xl overflow-y-auto text-[11px] leading-relaxed custom-scrollbar shadow-inner">
                    <div class="cursor-blink">等待信号接入...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8080/api' : `${window.location.protocol}//${window.location.host}/api`;
    const token = localStorage.getItem('token');
    const adminUser = localStorage.getItem('username') || "David部长";
    
    let currentEditingId = null; 
    let jobCache = {};
    let candidateCache = {}; // 🚀 缓存：存放全量候选人数据，防止 HTML 刺穿
    let liveMonitorTimer = null;

    window.onload = () => {
        if(!token) window.location.href = 'login.html';
        document.getElementById('admin-tag').innerText = `账号: ${adminUser}`;
        loadJobStats();
        setInterval(() => {
            if (document.getElementById('candidate-modal').classList.contains('hidden')) loadJobStats();
        }, 10000);
    };

    // 1. 🚀 对齐：加载招聘看板 (合并自 logic.js)
    async function loadJobStats() {
        try {
            const res = await fetch(`${API_BASE}/recruit/job-stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stats = await res.json();
            const container = document.getElementById('stat-container');
            
            if(!stats || stats.length === 0) {
                container.innerHTML = '<div class="col-span-full py-20 text-center text-gray-400">目前没有正在运行的岗位</div>';
                return;
            }

            container.innerHTML = stats.map(job => {
                jobCache[job.id] = job;
                return `
                <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-xl transition-all relative overflow-hidden group mb-4">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-purple-50 rounded-bl-[5rem] -mr-8 -mt-8 transition-all group-hover:scale-110"></div>
                    <div class="flex justify-between items-center mb-2 relative">
                        <h3 class="font-black text-xl text-purple-700">${job.title}</h3>
                        <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-[10px] font-black">${job.status}</span>
                    </div>
                    <p class="text-gray-500 text-xs line-clamp-2 mb-4 italic relative">${job.adText || "暂无详情"}</p>
                    
                    <div class="space-y-2 relative max-h-48 overflow-y-auto custom-scrollbar pr-2 mb-4">
                        ${job.candidates.map(c => {
                            candidateCache[c.id] = c; // 🚀 锁定：存入内存
                            return `
                            <div onclick='openCandidate(${c.id}, ${job.id})' class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl cursor-pointer hover:bg-purple-600 hover:text-white transition-all">
                                <span class="text-sm font-bold">${c.candidateName}</span>
                                <div class="text-right">
                                    <span class="text-[10px] font-black block">${extractScore(c.resumeAnalysis)}分</span>
                                    <span class="text-[8px] opacity-60 uppercase">${c.status}</span>
                                </div>
                            </div>`;
                        }).join('')}
                        ${job.candidates.length === 0 ? '<p class="text-gray-300 text-[10px] italic">暂无人才报名</p>' : ''}
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-100 flex justify-between items-center relative">
                        <div class="flex gap-2">
                            <button onclick="editJob(${job.id})" class="px-4 py-1 text-[10px] font-black bg-blue-50 text-blue-600 rounded-full hover:bg-blue-600 hover:text-white transition-all">📝 编辑</button>
                            <button onclick="deleteJob(${job.id})" class="px-4 py-1 text-[10px] font-black bg-red-50 text-red-600 rounded-full hover:bg-red-600 hover:text-white transition-all">🗑️ 抹除</button>
                        </div>
                        <span class="text-[10px] text-gray-300 font-mono">COUNT: ${job.candidateCount}</span>
                    </div>
                </div>`;
            }).join('');
        } catch (e) { console.error("📡 看板同步中断"); }
    }

    // 2. 🚀 对齐：展示候选人详情 (合并自 logic.js 的 Modal 触发)
    function openCandidate(candidateId, jobId) {
        const c = candidateCache[candidateId];
        const modal = document.getElementById('candidate-modal');
        
        document.getElementById('modal-name').innerText = c.candidateName;
        document.getElementById('modal-status-tag').innerText = c.status;
        
        // 🚀 核心纠偏：使用 marked 渲染报告，杜绝乱码
        document.getElementById('report-resume').innerHTML = c.resumeAnalysis 
            ? marked.parse(c.resumeAnalysis) 
            : "<span class='text-gray-300 italic'>AI 评估报告正在生成中...</span>";
            
        document.getElementById('report-test-q').innerText = c.writtenTestPaper || "未配置笔试题目";
        document.getElementById('report-test-a').innerText = c.writtenTestAnswer || "尚未提交答卷";
        
        // 🚀 逻辑对齐：展示 AI 核心评价
        document.getElementById('report-test-eval').innerHTML = `
            <strong>💡 AI 核心评价：</strong>
            <p class="mt-1">${c.resumeAnalysis ? '评估已完成，请查看左侧报告' : '笔试进行中...'}</p>
        `;
        
        const chatBox = document.getElementById('report-chat');
        chatBox.innerHTML = c.chatHistory ? c.chatHistory.replace(/\n/g, '<br>') : "<div class='cursor-blink'>等待信号接入...</div>";
        chatBox.dataset.lastContent = c.chatHistory || ""; 
        
        document.getElementById('btn-interrupt').onclick = () => handleAction(c.id, 'interrupt');
        document.getElementById('btn-hire').onclick = () => handleAction(c.id, 'hire');
        
        modal.classList.remove('hidden');

        // 启动面试实况监控雷达
        if (liveMonitorTimer) clearInterval(liveMonitorTimer);
        liveMonitorTimer = setInterval(async () => {
            try {
                const res = await axios.get(`${API_BASE}/recruit/candidate/${c.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const latest = res.data;
                if (latest.chatHistory && chatBox.dataset.lastContent !== latest.chatHistory) {
                    chatBox.innerHTML = latest.chatHistory.replace(/\n/g, '<br>');
                    chatBox.dataset.lastContent = latest.chatHistory;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (e) {}
        }, 3000);
    }

    // 🚀 技巧：从 AI 评估文本中提取分数 (保持 logic.js 算法)
    function extractScore(report) {
        if(!report) return 0;
        const match = report.match(/(\d+)分/);
        return match ? match[1] : '--';
    }

    // 后续业务函数 (AI生成、发布、删除、操作) 原样保留
    async function generateAd() {
        const title = document.getElementById('job-title').value;
        const desc = document.getElementById('job-desc').value;
        const btn = document.getElementById('gen-btn');
        if(!title) return alert("请输入岗位名称");
        btn.innerText = "⏳ 正在为您生成，大约1分钟，请耐心等待";
        btn.disabled = true;
        try {
            const res = await axios.post(`${API_BASE}/recruit/generate-ad`, { title, demand: desc }, { timeout: 180000, headers: { 'Authorization': `Bearer ${token}` } });
            if (res.data && res.data.adContent) {
                document.getElementById('ad-content').value = res.data.adContent; 
                document.getElementById('ad-edit-area').classList.remove('hidden');
                document.getElementById('pub-btn').classList.remove('hidden');
                document.getElementById('pub-btn').innerText = currentEditingId ? "💾 覆盖同步岗位" : "📢 发布新岗位";
            }
        } catch (e) { alert("⚠️ 服务器正忙"); } finally { btn.innerText = "✨ 重新生成广告"; btn.disabled = false; }
    }

    async function publishJob() {
        const title = document.getElementById('job-title').value;
        const adText = document.getElementById('ad-content').value;
        if(!adText) return alert("广告内容不能为空");
        try {
            const payload = { id: currentEditingId, title, adText, status: "OPEN" };
            const res = await axios.post(`${API_BASE}/recruit/jobs/publish`, payload, { headers: { 'Authorization': `Bearer ${token}` } });
            if(res.status === 200) { alert("🎉 AI面试官已为您发布（更新）招聘公告！"); resetForm(); loadJobStats(); }
        } catch (e) { alert("💾 存储失败"); }
    }

    function editJob(id) {
        const job = jobCache[id];
        if(!job) return;
        currentEditingId = id;
        document.getElementById('job-title').value = job.title;
        document.getElementById('ad-content').value = job.adText;
        document.getElementById('ad-edit-area').classList.remove('hidden');
        document.getElementById('pub-btn').classList.remove('hidden');
        document.getElementById('pub-btn').innerText = "💾 覆盖同步岗位";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        currentEditingId = null;
        document.getElementById('job-title').value = "";
        document.getElementById('job-desc').value = "";
        document.getElementById('ad-content').value = "";
        document.getElementById('ad-edit-area').classList.add('hidden');
        document.getElementById('pub-btn').classList.add('hidden');
    }

    async function deleteJob(id) {
        if (!confirm("⚠️ 警告：抹除岗位将清空所有候选人数据！确定？")) return;
        try {
            await axios.delete(`${API_BASE}/recruit/jobs/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            loadJobStats();
        } catch (e) { alert("❌ 删除失败"); }
    }

    function closeModal() {
        if (liveMonitorTimer) clearInterval(liveMonitorTimer);
        document.getElementById('candidate-modal').classList.add('hidden');
    }

    async function handleAction(id, action) {
        if(!confirm(`确认：执行 ${action === 'hire' ? '录用' : '中断面试'} 指令？`)) return;
        try {
            await axios.post(`${API_BASE}/recruit/${action}`, {id}, { headers: { 'Authorization': `Bearer ${token}` } });
            alert("🎯 指令已穿透执行");
            closeModal();
            loadJobStats();
        } catch (e) { alert("❌ 指令执行中断"); }
    }
</script>
</body>
</html>
